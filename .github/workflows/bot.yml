name: Monitoring Bot

on:
  schedule:
    - cron: '0 6 * * 1'   # Mondays at 06:00 UTC
  workflow_dispatch:        # Manual trigger from GitHub UI

jobs:
  monitor:
    name: Run firm scrapers
    runs-on: ubuntu-latest

    permissions:
      contents: write       # push temp branch
      pull-requests: write  # open PR

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # full history needed for git operations

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Configure git
        run: |
          git config user.name  "OpenPropFirm Bot"
          git config user.email "bot@openpropfirm.com"

      - name: Run health check
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx tsx --project tsconfig.scripts.json scripts/monitor/health-check.ts

      - name: Run monitor
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx tsx --project tsconfig.scripts.json scripts/monitor/runner.ts
